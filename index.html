<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./index.css">
    <title>Controle de gastos</title>
  </head>
  <body>
    <header class="header">
      <h1>Gerador de arquivos json para Banco De Dados para gastos</h1>
    </header>
    <aside class="aside">
      <div class="gerar"></div>
    </aside>
    <main>
      <section>
        <h2>Confirme o Formulário para aumentar seu Banco De Dados</h2>
        <form class="aumeta">
          <input
            type="text"
            required
            placeholder="Nome do gasto"
            id="nome"
          /><input
            type="number"
            required
            id="preco"
            placeholder="Preço do gasto"
          />
          <input
            type="text"
            required
            placeholder="Data do pagamento EX: 19/03/2026"
            id="data"
          />
          <select id="tipo">
            <option value="0">Pago</option>
            <option value="1">Em aberto</option>
          </select>
          <button type="button" id="add">Adicionar ao Banco</button>
        </form>
      </section>
      <article>
        <p>
          Recomendação de uso:<br />
          <ul>
            *Não saia do site pelo navegador<br />*Abra o console apertando Ctrl
            + Shift + J e copie os dados
          </ul>
        </p>
      </article>
    </main>
    <script src="./index.js"></script>
  </body>
</html>
